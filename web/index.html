<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TG to PDF</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-box">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </div>
        <div class="title-box">
            <h1>TG to PDF</h1>
            <p>Генератор отчетов из Telegram</p>
        </div>
    </header>

    <div class="glass-panel">
        <div class="input-group">
            <label>ИСХОДНЫЙ JSON</label>
            <div class="input-row">
                <input type="text" id="json-path" placeholder="Выберите result.json..." readonly>
                <button class="btn-icon" id="btn-json"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></button>
            </div>
        </div>

        <div class="input-group">
            <label>СОХРАНИТЬ КАК</label>
            <div class="input-row">
                <input type="text" id="pdf-path" placeholder="Папка и имя файла..." readonly>
                <button class="btn-icon" id="btn-pdf"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline></svg></button>
            </div>
        </div>

        <div class="settings-grid">
            <div class="input-group">
                <label>ПЕРИОД: ОТ</label>
                <input type="date" id="date-from" class="modern-input">
            </div>
            <div class="input-group">
                <label>ПЕРИОД: ДО</label>
                <div style="display: flex; gap: 5px;">
                    <input type="date" id="date-to" class="modern-input">
                    <button class="btn-icon" id="btn-calc" title="Оценить объем" style="background: var(--accent); color: white; border:none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l2-9 5 18 2-9h4"></path></svg>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label>ШРИФТ ТЕКСТА</label>
                <div class="custom-select" id="wrapper-font" data-value="">
                    <div class="select-selected">По умолчанию</div>
                    <div class="select-items select-hide" id="list-fonts"><div data-val="">По умолчанию</div></div>
                </div>
            </div>

            <div class="input-group">
                <label>РАЗМЕР ТЕКСТА</label>
                <div class="custom-select" id="wrapper-size" data-value="12">
                    <div class="select-selected">Стандартный (12pt)</div>
                    <div class="select-items select-hide">
                        <div data-val="10">Мелкий (10pt)</div><div data-val="12">Стандартный (12pt)</div>
                        <div data-val="14">Крупный (14pt)</div><div data-val="16">Огромный (16pt)</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="calc-result" class="calc-box" style="display: none;"></div>

        <!-- Переключатели -->
        <div class="toggles-grid">
            <label class="toggle-label"><input type="checkbox" id="check-theme"><span class="toggle-custom"></span> Темная тема PDF</label>
            <label class="toggle-label"><input type="checkbox" id="check-media" checked><span class="toggle-custom"></span> Метки медиа</label>
            <label class="toggle-label"><input type="checkbox" id="check-toc" checked><span class="toggle-custom"></span> Оглавление (По дням)</label>
            <label class="toggle-label"><input type="checkbox" id="check-links" checked><span class="toggle-custom"></span> Индекс ссылок</label>
            <label class="toggle-label"><input type="checkbox" id="check-charts" checked><span class="toggle-custom"></span> Графики + Heatmap</label>
            <label class="toggle-label"><input type="checkbox" id="check-wordcloud" checked><span class="toggle-custom"></span> Облако слов (WordCloud)</label>
            <label class="toggle-label"><input type="checkbox" id="check-top" checked><span class="toggle-custom"></span> Топ-12 авторов</label>
            <label class="toggle-label"><input type="checkbox" id="check-watermark" checked><span class="toggle-custom"></span> Даты и Водяные знаки</label>
        </div>

        <div class="action-section">
            <div class="status-indicator">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">Ожидание...</span>
            </div>
            <button class="btn-primary" id="btn-start" disabled>Собрать PDF</button>
        </div>
    </div>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="mac-btns"><span></span><span></span><span></span></div>
            <div class="terminal-title">converter.log</div>
        </div>
        <textarea id="log-area" readonly>> Система готова...</textarea>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
